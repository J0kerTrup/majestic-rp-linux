# Majestic Proton config for Linux.
# Put this file next to install-and-run-majestic-proton.sh.

# GTA V startup resolution.
GAME_WIDTH=1920
GAME_HEIGHT=1080

# 1 = windowed/borderless, 0 = fullscreen.
GAME_WINDOWED=1
GAME_BORDERLESS=1

# Keep this enabled for Proton unless you know CEF GPU works on your setup.
DISABLE_CEF_GPU=1

# Platform of your GTA V installation.
# Leave empty for auto-detection (recommended):
#   rgl   — Rockstar Games Launcher (GTAVLauncher.exe present, no EOSSDK DLL)
#   steam — Steam (steam_api64.dll present, no EOSSDK DLL)
#   egs   — Epic Games Store (EOSSDK-Win64-Shipping.dll present)
# Auto-detection runs when this is left as 'rgl' but actual platform differs.
MAJESTIC_PLATFORM=steam

# Wine drive letter mapped to the real GTA folder.
GTA_WINE_DRIVE=g

# Majestic permissions bytes written into Multiplayer cache folders.
MAJESTIC_PERMISSIONS=1,3,4

# Set to 1 if Rockstar/Social Club cache is stuck.
RESET_ROCKSTAR_DOCUMENTS=0

# Proton verb:
#   waitforexitandrun — recommended, works with Steam overlay
#   runinprefix — for manual terminal launches only
PROTON_VERB=waitforexitandrun

# Electron command-line flags for Wine/Proton stability.
MAJESTIC_LAUNCHER_FLAGS="--no-sandbox --disable-dev-shm-usage --disable-gpu-sandbox"

# Optional manual paths. Leave empty for auto-detection.

# GTA V Steam AppID
APP_ID=271590

# Steam root
STEAM_ROOT=/home/joker/.local/share/Steam
# GTA V Proton prefix
STEAM_COMPAT_DATA_PATH=/home/joker/.local/share/Steam/steamapps/compatdata/271590
# GTA V installation
GTA_PATH="/home/joker/.local/share/Steam/steamapps/common/Grand Theft Auto V"
# Proton
PROTON_PATH="/home/joker/.local/share/Steam/steamapps/common/Proton - Experimental/proton"
# Majestic Launcher prefix
MAJESTIC_EXE="/home/joker/.local/share/Steam/steamapps/compatdata/3203438987/pfx/drive_c/users/steamuser/AppData/Local/MajesticLauncher/Majestic Launcher.exe"