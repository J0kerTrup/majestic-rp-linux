# Majestic Proton config for Linux.
# Put this file next to install-and-run-majestic-proton.sh.

# GTA V startup resolution.
GAME_WIDTH=1920
GAME_HEIGHT=1080

# 1 = windowed/borderless, 0 = fullscreen.
GAME_WINDOWED=1
GAME_BORDERLESS=1

# Keep this enabled for Proton unless you know CEF GPU works on your setup.
DISABLE_CEF_GPU=1

# Native Majestic patcher behaves better through Rockstar Launcher flow under Proton.
# Allowed values: rgl, steam, egs. 'rgl' is recommended for Proton.
MAJESTIC_PLATFORM=rgl

# Wine drive letter mapped to the real GTA folder.
GTA_WINE_DRIVE=g

# Majestic permissions bytes written into Multiplayer cache folders.
MAJESTIC_PERMISSIONS=1,3,4

# Set to 1 if Rockstar/Social Club cache is stuck.
RESET_ROCKSTAR_DOCUMENTS=0

# Proton verb:
#   waitforexitandrun — recommended, works with Steam overlay
#   runinprefix — for manual terminal launches only
PROTON_VERB=waitforexitandrun

# Electron command-line flags for Wine/Proton stability.
MAJESTIC_LAUNCHER_FLAGS="--no-sandbox --disable-dev-shm-usage --disable-gpu-sandbox"

# Optional manual paths. Leave empty for auto-detection.
APP_ID=271590
STEAM_ROOT=
STEAM_COMPAT_DATA_PATH=
GTA_PATH=
PROTON_PATH=
MAJESTIC_EXE=
