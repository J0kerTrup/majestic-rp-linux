# Majestic Proton config for Linux.
# Put this file next to install-and-run-majestic-proton.sh.

# GTA V startup resolution.
GAME_WIDTH=1920
GAME_HEIGHT=1080

# 1 = windowed/borderless, 0 = fullscreen.
GAME_WINDOWED=1
GAME_BORDERLESS=1

# Keep this enabled for Proton unless you know CEF GPU works on your setup.
DISABLE_CEF_GPU=1
MAJESTIC_LAUNCHER_FLAGS="--no-sandbox --disable-dev-shm-usage --disable-gpu-sandbox"

# Wine DLL overrides merged with existing WINEDLLOVERRIDES.
# dcomp=d avoids Wine DirectComposition thumbnail crashes in Electron.
MAJESTIC_WINE_DLL_OVERRIDES="winegstreamer=d;dcomp=d"

# Linux input settings for Proton.
# ru_RU.UTF-8 helps Russian text input when the locale is generated on the system.
MAJESTIC_LOCALE=ru_RU.UTF-8
MAJESTIC_INPUT_METHOD=xim
# Optional XKB hints for XWayland/Proton. Leave empty to keep system layout.
MAJESTIC_XKB_LAYOUT=
MAJESTIC_XKB_OPTIONS=
# Temporarily disable Super/Win keys via xmodmap during the launcher session.
MAJESTIC_DISABLE_SUPER_KEYS=1

# Write every bash command step into logs/majestic-proton-steps.log.
# 1 = enabled, 0 = disabled.
MAJESTIC_TRACE_STEPS=1

# Platform of your GTA V installation.
# Use auto-detection (recommended):
#   rgl   — Rockstar Games Launcher (GTAVLauncher.exe present, no EOSSDK DLL)
#   steam — Steam (steam_api64.dll present, no EOSSDK DLL)
#   egs   — Epic Games Store (EOSSDK-Win64-Shipping.dll present)
# Set rgl, steam or egs only when you want to force a platform.
MAJESTIC_PLATFORM=auto

# Optional native patcher platform override.
# Leave empty: Steam Proton uses rgl internally, while Steam AppID/env stay 271590.
MAJESTIC_PROTON_NATIVE_PLATFORM=

# Wine drive letter mapped to the real GTA folder.
# Do not use C or Z; they are reserved by Wine. Use G, E, D, etc.
GTA_WINE_DRIVE=g

# Majestic permissions bytes written into Multiplayer cache folders.
MAJESTIC_PERMISSIONS=1

# Set to 1 if Rockstar/Social Club cache is stuck.
RESET_ROCKSTAR_DOCUMENTS=0

# Apply Windows 10 mode to the Proton prefix before launching.
# PROTONTRICKS_TIMEOUT=0 keeps the original unbounded protontricks behavior.
PROTONTRICKS_WIN10=1
PROTONTRICKS_TIMEOUT=0
PROTONTRICKS_STOP_PREFIX=1

# Proton verb:
#   waitforexitandrun — recommended, works with Steam overlay
#   runinprefix — for manual terminal launches only
PROTON_VERB=waitforexitandrun

# Majestic Launcher installer. Used automatically when Majestic Launcher.exe is missing.
#MAJESTIC_INSTALLER_URL="https://cdn-eu.majestic-files.net/launcher/global/MajesticLauncherSetup.exe"
MAJESTIC_INSTALLER_URL="https://cdn.majestic-files.net/launcher/cis/MajesticLauncherSetup.exe"
MAJESTIC_INSTALLER_PATH=""
MAJESTIC_INSTALLER_ARGS="/S"
MAJESTIC_INSTALLER_TIMEOUT=30

# Optional manual paths. Leave empty for auto-detection.

# Optional Discord RPC bridge for Wine/Proton Rich Presence.
# Leave empty to auto-use winediscordipcbridge.exe next to this script when present.
# You may also set DISCORD_BRIDGE_PATH to a local bridge executable or direct download URL.
DISCORD_BRIDGE_PATH=
DISCORD_BRIDGE_URL=
DISCORD_BRIDGE_START_DELAY=2

# GTA V Steam AppID
APP_ID=

# Steam root
STEAM_ROOT=
# GTA V Proton prefix. Majestic Launcher is installed and searched in this same prefix.
STEAM_COMPAT_DATA_PATH=
# GTA V installation
GTA_PATH=
# Proton
PROTON_PATH=
# Optional Majestic Launcher executable. Must be inside STEAM_COMPAT_DATA_PATH/pfx.
MAJESTIC_EXE=

# Optional recovered launcher source tree. Leave empty for normal app.asar patching.
MAJESTIC_SOURCE_ROOT=
