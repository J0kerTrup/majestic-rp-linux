# Majestic Proton quick patch config for Linux.
# Put this file next to install-and-run-majestic-proton.sh.

# GTA V startup resolution.
GAME_WIDTH=1280
GAME_HEIGHT=720

# 1 = windowed/borderless, 0 = fullscreen.
GAME_WINDOWED=1
GAME_BORDERLESS=1

# Keep this enabled for Proton unless you know CEF GPU works on your setup.
DISABLE_CEF_GPU=1

# Native Majestic patcher behaves better through Rockstar Launcher flow under Proton.
# Allowed values: rgl, steam, egs.
MAJESTIC_PLATFORM=rgl

# Wine drive letter mapped to the real GTA folder.
GTA_WINE_DRIVE=g

# Majestic permissions bytes written into Multiplayer cache folders.
# Default observed by launcher: 1,3,4. 255 is appended by the script/launcher.
MAJESTIC_PERMISSIONS=1,3,4

# Set to 1 if Rockstar/Social Club cache is stuck and you want a fresh Documents folder.
# The old folder is renamed, not deleted.
RESET_ROCKSTAR_DOCUMENTS=0

# Direct Proton launches should use runinprefix; run/waitforexitandrun may try
# c:\windows\system32\steam.exe first and fail outside a normal Steam launch.
PROTON_VERB=runinprefix

# Optional manual paths. Leave empty for auto-detection.
# Auto-detection supports regular Steam, Flatpak Steam, and Snap Steam.

# Optional Steam AppId override.
# Leave empty: the script scans the GTA V Steam manifest and derives AppId itself.
# Official Steam Legacy GTA V is usually 271590.
APP_ID=

STEAM_ROOT=
STEAM_COMPAT_DATA_PATH=
GTA_PATH=
PROTON_PATH=
MAJESTIC_EXE=
