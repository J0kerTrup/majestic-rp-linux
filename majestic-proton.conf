# Majestic Proton config for Linux.
# Put this file next to install-and-run-majestic-proton.sh.

# GTA V startup resolution.
GAME_WIDTH=1920
GAME_HEIGHT=1080

# 1 = windowed/borderless, 0 = fullscreen.
GAME_WINDOWED=1
GAME_BORDERLESS=1

# Keep this enabled for Proton unless you know CEF GPU works on your setup.
DISABLE_CEF_GPU=1

# Platform of your GTA V installation.
# Use auto-detection (recommended):
#   rgl   — Rockstar Games Launcher (GTAVLauncher.exe present, no EOSSDK DLL)
#   steam — Steam (steam_api64.dll present, no EOSSDK DLL)
#   egs   — Epic Games Store (EOSSDK-Win64-Shipping.dll present)
# Set rgl, steam or egs only when you want to force a platform.
MAJESTIC_PLATFORM=auto

# Wine drive letter mapped to the real GTA folder.
GTA_WINE_DRIVE=d

# Majestic permissions bytes written into Multiplayer cache folders.
MAJESTIC_PERMISSIONS=1

# Set to 1 if Rockstar/Social Club cache is stuck.
RESET_ROCKSTAR_DOCUMENTS=0

# Proton verb:
#   waitforexitandrun — recommended, works with Steam overlay
#   runinprefix — for manual terminal launches only
PROTON_VERB=waitforexitandrun

# Majestic Launcher installer. Used automatically when Majestic Launcher.exe is missing.
MAJESTIC_INSTALLER_URL="https://cdn.majestic-files.net/launcher/cis/MajesticLauncherSetup.exe"
MAJESTIC_INSTALLER_PATH=""
MAJESTIC_INSTALLER_ARGS="/S"

# Optional manual paths. Leave empty for auto-detection.

# GTA V Steam AppID
APP_ID=

# Steam root
STEAM_ROOT=
# GTA V Proton prefix. Majestic Launcher is installed and searched in this same prefix.
STEAM_COMPAT_DATA_PATH=
# GTA V installation
GTA_PATH=
# Proton
PROTON_PATH=
# Optional Majestic Launcher executable. Must be inside STEAM_COMPAT_DATA_PATH/pfx.
MAJESTIC_EXE=
