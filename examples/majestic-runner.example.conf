# Example Majestic Proton config for the Python runner.

GAME_WIDTH=1920
GAME_HEIGHT=1080
GAME_WINDOWED=1
GAME_BORDERLESS=1

DISABLE_CEF_GPU=1
MAJESTIC_LAUNCHER_FLAGS="--no-sandbox --disable-dev-shm-usage --disable-gpu-sandbox"

# auto, steam, rgl, egs
MAJESTIC_PLATFORM=auto
MAJESTIC_PROTON_NATIVE_PLATFORM=

GTA_WINE_DRIVE=g
MAJESTIC_PERMISSIONS=1

MAJESTIC_INSTALLER_URL="https://cdn.majestic-files.net/launcher/cis/MajesticLauncherSetup.exe"
MAJESTIC_INSTALLER_PATH=
MAJESTIC_INSTALLER_ARGS="/S"
MAJESTIC_INSTALLER_TIMEOUT=30

APP_ID=
STEAM_ROOT=
STEAM_COMPAT_DATA_PATH=
GTA_PATH=
PROTON_PATH=
MAJESTIC_EXE=
MAJESTIC_SOURCE_ROOT=

DRY_RUN=0
