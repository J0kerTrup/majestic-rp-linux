name: Build RPM Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Install system tools
        run: |
          dnf update -y
          dnf install -y \
            git \
            tar \
            gzip \
            rpm-build \
            rpmdevtools \
            python3 \
            python3-devel \
            python3-pip \
            python3-build \
            python3-installer \
            python3-setuptools \
            python3-wheel \
            ImageMagick \
            wget \
            nodejs \
            npm

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set safe directory for Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Calculate RPM version
        run: |
          RAW_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")"
          RAW_TAG="${RAW_TAG#v}"

          PKG_VER="$(echo "$RAW_TAG" | sed 's/[^A-Za-z0-9._~]/_/g')"
          PKG_REL="$(git rev-list --count HEAD).$(git rev-parse --short HEAD)"

          echo "PKG_VER=$PKG_VER" >> "$GITHUB_ENV"
          echo "PKG_REL=$PKG_REL" >> "$GITHUB_ENV"

          echo "RPM version: $PKG_VER"
          echo "RPM release: $PKG_REL"

      - name: Prepare RPM source archive
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          tar -czf ~/rpmbuild/SOURCES/majestic-linux-runner.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='*.egg-info' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            -C "$GITHUB_WORKSPACE" .

      - name: Generate RPM spec
        run: |
          cat > ~/rpmbuild/SPECS/majestic-linux-runner.spec << EOF
          Name:           majestic-linux-runner
          Version:        ${PKG_VER}
          Release:        ${PKG_REL}%{?dist}
          Summary:        Python orchestration runner for Majestic RP on Linux via Proton

          License:        MIT
          URL:            https://github.com/J0kerTrup/majestic-rp-linux
          Source0:        %{name}.tar.gz

          BuildArch:      noarch

          BuildRequires:  python3
          BuildRequires:  python3-devel
          BuildRequires:  python3-build
          BuildRequires:  python3-installer
          BuildRequires:  python3-setuptools
          BuildRequires:  python3-wheel
          BuildRequires:  nodejs
          BuildRequires:  npm
          BuildRequires:  ImageMagick
          BuildRequires:  wget

          Requires:       python3
          Requires:       bash
          Requires:       nodejs
          Requires:       npm

          %description
          Python orchestration runner for Majestic RP on Linux via Proton.

          %prep
          %setup -q -c -n %{name}

          %build
          python3 -m build --wheel --no-isolation

          %install
          rm -rf %{buildroot}

          mkdir -p %{buildroot}%{_bindir}
          mkdir -p %{buildroot}%{_datadir}/applications
          mkdir -p %{buildroot}%{_datadir}/icons/hicolor/256x256/apps
          mkdir -p %{buildroot}%{_datadir}/majestic-linux-runner
          mkdir -p %{buildroot}%{_docdir}/majestic-linux-runner

          python3 -m installer --destdir="%{buildroot}" dist/*.whl

          cat > %{buildroot}%{_datadir}/applications/majestic-linux.desktop << 'DESK'
          [Desktop Entry]
          Name=Majestic RP
          Comment=Launcher for Majestic RP on Linux
          Exec=majestic-linux
          Icon=majestic-linux
          Terminal=false
          Type=Application
          Categories=Game;
          StartupNotify=true
          DESK

          wget -qO temp-icon.webp "https://majestic-rp.ru/images/keys/step-icon__launcher.webp"
          convert temp-icon.webp %{buildroot}%{_datadir}/icons/hicolor/256x256/apps/majestic-linux.png

          if [ -f "examples/majestic-runner.example.conf" ]; then
            cp examples/majestic-runner.example.conf %{buildroot}%{_docdir}/majestic-linux-runner/
          fi

          cd %{buildroot}%{_datadir}/majestic-linux-runner
          npm init -y
          npm install @electron/asar
          cd -

          ln -sf ../share/majestic-linux-runner/node_modules/.bin/asar %{buildroot}%{_bindir}/asar

          %files
          %{_bindir}/*
          %{python3_sitelib}/*
          %{_datadir}/applications/majestic-linux.desktop
          %{_datadir}/icons/hicolor/256x256/apps/majestic-linux.png
          %{_datadir}/majestic-linux-runner/
          %{_docdir}/majestic-linux-runner/

          %changelog
          * Tue Jun 23 2026 Majestic Linux Builder <noreply@example.com> - ${PKG_VER}-${PKG_REL}
          - Automated RPM build from GitHub Actions
          EOF

      - name: Build RPM package
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/majestic-linux-runner.spec

      - name: Show generated RPMs
        run: |
          find ~/rpmbuild/RPMS -type f -name "*.rpm" -print

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: majestic-linux-runner-rpm
          path: /github/home/rpmbuild/RPMS/noarch/*.rpm